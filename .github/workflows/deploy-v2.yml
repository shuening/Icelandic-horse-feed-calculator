name: Deploy V2 Preview (v2 branch)

on:
  push:
    branches: [v2]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout v2
        uses: actions/checkout@v4
        with:
          ref: v2

      - name: Checkout main into _main
        uses: actions/checkout@v4
        with:
          ref: main
          path: _main

      - name: Check if dev branch exists
        id: check-dev
        run: |
          if git ls-remote --heads origin dev | grep -q dev; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout dev into _dev
        if: steps.check-dev.outputs.exists == 'true'
        uses: actions/checkout@v4
        with:
          ref: dev
          path: _dev

      - name: Build combined site
        run: |
          mkdir -p _site/preview _site/v2
          # Main (production) at root
          cp _main/index.html _site/index.html
          cp _main/firebase-rules.json _site/firebase-rules.json 2>/dev/null || true
          # Dev preview at /preview/
          if [ -d "_dev" ]; then
            cp _dev/index.html _site/preview/index.html
            cp _dev/firebase-rules.json _site/preview/firebase-rules.json 2>/dev/null || true
          fi
          # V2 preview at /v2/
          cp index.html _site/v2/index.html
          cp firebase-rules.json _site/v2/firebase-rules.json 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
