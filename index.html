<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f5f0eb;--card:#fff;--primary:#5c4033;--primary-light:#8b6f5e;--accent:#6b8e23;
--accent-light:#8fbc3a;--text:#3a2e28;--text-light:#7a6e68;--border:#e0d5cc;
--danger:#c0392b;--warning:#e67e22;--success:#27ae60;--info:#2980b9;
--shadow:0 2px 8px rgba(0,0,0,.08);--radius:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:72px}
.header{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff;padding:16px 20px 12px;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.tabs{display:flex;overflow-x:auto;gap:4px;background:var(--primary);padding:0 12px;position:sticky;top:52px;z-index:99;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 14px;color:rgba(255,255,255,.65);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border-bottom:3px solid transparent;transition:.2s}
.tab.active{color:#fff;border-bottom-color:var(--accent-light)}
.tab:hover{color:rgba(255,255,255,.9)}
.page{display:none;padding:16px;animation:fadeIn .25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px;border:1px solid var(--border)}
.card h3{font-size:16px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.3px}
.badge-senior{background:#f0e6d3;color:#8b6914}
.badge-pssm{background:#fde8e8;color:#c0392b}
.badge-teeth{background:#fef3e2;color:#e67e22}
.badge-digestive{background:#e8f6e8;color:#27ae60}
.badge-ir{background:#fde8e8;color:#c0392b}
.badge-overweight{background:#fef3e2;color:#e67e22}
.badge-hoof{background:#e8eef6;color:#2980b9}
.badge-healthy{background:#e8f6e8;color:#27ae60}
.target-bar{height:8px;background:#e8e0d8;border-radius:4px;margin:8px 0;overflow:visible;position:relative}
.target-fill{height:100%;border-radius:4px;transition:width .4s ease;position:relative}
.target-fill.under{background:var(--warning)}
.target-fill.good{background:var(--success)}
.target-fill.over{background:var(--danger)}
.target-range{display:flex;justify-content:space-between;font-size:11px;color:var(--text-light);margin-top:2px}
.target-label{font-size:13px;font-weight:600;margin-top:4px}
.feed-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.feed-row:last-child{border-bottom:none}
.feed-name{font-size:13px;flex:1;min-width:0}
.feed-name small{display:block;color:var(--text-light);font-size:11px}
.feed-controls{display:flex;align-items:center;gap:6px}
.feed-controls button{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--bg);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--primary);font-weight:700;transition:.15s}
.feed-controls button:active{background:var(--primary);color:#fff}
.feed-controls input{width:52px;text-align:center;border:1px solid var(--border);border-radius:8px;padding:4px;font-size:14px;font-weight:600}
.feed-controls .unit{font-size:11px;color:var(--text-light);width:20px}
.feed-rec{font-size:11px;color:var(--accent);font-weight:600}
.notes{background:#faf7f3;border-left:3px solid var(--accent);padding:10px 12px;border-radius:0 8px 8px 0;margin-top:8px;font-size:13px;color:var(--text-light)}
.supp-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);gap:10px}
.supp-row:last-child{border-bottom:none}
.supp-toggle{position:relative;width:42px;height:24px;flex-shrink:0}
.supp-toggle input{opacity:0;width:0;height:0}
.supp-toggle .slider{position:absolute;inset:0;background:#ccc;border-radius:24px;cursor:pointer;transition:.2s}
.supp-toggle .slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.supp-toggle input:checked+.slider{background:var(--accent)}
.supp-toggle input:checked+.slider:before{transform:translateX(18px)}
.supp-info{flex:1;min-width:0}
.supp-info .name{font-size:13px;font-weight:600}
.supp-info .desc{font-size:11px;color:var(--text-light)}
.supp-dose{display:flex;align-items:center;gap:4px}
.supp-dose input{width:40px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:3px;font-size:13px}
.supp-dose .unit{font-size:11px;color:var(--text-light)}
.summary-table{width:100%;font-size:13px;border-collapse:collapse}
.summary-table th{text-align:left;padding:8px 6px;border-bottom:2px solid var(--border);font-size:12px;color:var(--text-light);font-weight:600}
.summary-table td{padding:6px;border-bottom:1px solid var(--border)}
.summary-table tr:last-child td{border-bottom:none}
.summary-table .total-row{font-weight:700;background:var(--bg)}
.btn{padding:10px 20px;border-radius:var(--radius);border:none;font-size:14px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:active{background:var(--primary-light)}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:active{background:var(--accent-light)}
.btn-danger{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-block{display:block;width:100%;text-align:center}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:4px;color:var(--text-light)}
.form-group input,.form-group select{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--card)}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--primary)}
.horse-tabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.horse-tab{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid var(--border);background:var(--card);white-space:nowrap;transition:.2s}
.horse-tab.active{border-color:var(--primary);background:var(--primary);color:#fff}
.log-entry{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.log-entry:last-child{border-bottom:none}
.log-date{font-weight:600;font-size:14px}
.log-actions{display:flex;gap:6px}
.chart-container{position:relative;width:100%;height:280px;margin:12px 0}
canvas{width:100%!important;height:100%!important}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-light)}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.pasture-toggle{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border-radius:8px;margin-bottom:8px}
.conditions-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.season-toggle{display:flex;gap:8px;margin-bottom:16px}
.season-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;font-size:13px;font-weight:600;background:var(--card);transition:.2s}
.season-btn.active{border-color:var(--accent);background:var(--accent);color:#fff}
.horse-settings-card{margin-bottom:16px}
.condition-chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:12px;border:1px solid var(--border);background:var(--bg);cursor:pointer;transition:.15s}
.condition-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.activity-selector{display:flex;gap:6px;flex-wrap:wrap}
.activity-opt{padding:6px 12px;border-radius:20px;font-size:12px;border:2px solid var(--border);cursor:pointer;background:var(--card);transition:.2s}
.activity-opt.active{border-color:var(--accent);background:var(--accent);color:#fff}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mt-8{margin-top:8px}.mt-16{margin-top:16px}
</style>
</head>
<body>
<div class="header"><h1>🐴 Icelandic Horse Feed Calculator</h1></div>
<div class="tabs" id="tabs">
<div class="tab active" data-tab="recs">🥕 Feed</div>
<div class="tab" data-tab="supps">💊 Supps</div>
<div class="tab" data-tab="summary">📊 Summary</div>
<div class="tab" data-tab="logs">📋 Logs</div>
<div class="tab" data-tab="trends">📈 Trends</div>
<div class="tab" data-tab="settings">⚙️ Settings</div>
</div>

<div id="page-recs" class="page active"></div>
<div id="page-supps" class="page"></div>
<div id="page-summary" class="page"></div>
<div id="page-logs" class="page"></div>
<div id="page-trends" class="page"></div>
<div id="page-settings" class="page"></div>

<script>
'use strict';
// ── Data Defaults ──
const FEED_TYPES=[
{id:'pasture',name:'Free Roaming Pasture',unit:'est.',isPasture:true},
{id:'timothy_hay',name:'Timothy Hay (dry)',unit:'lb'},
{id:'alfalfa_hay',name:'Alfalfa Hay (dry)',unit:'lb'},
{id:'soaked_timothy',name:'Soaked Timothy Cubes',unit:'lb'},
{id:'soaked_teff',name:'Soaked Teff Cubes',unit:'lb'},
{id:'soaked_alfalfa',name:'Soaked Alfalfa Cubes',unit:'lb'},
{id:'special_pellets',name:'Haystack Special Blend Pellets',unit:'lb'},
{id:'soaked_beet',name:'Soaked Beet Pulps',unit:'lb'}
];

const ALL_CONDITIONS=['senior','teeth','digestive','pssm','hoof','ir','overweight','healthy'];
const CONDITION_LABELS={senior:'Senior',teeth:'Teeth Problem',digestive:'Digestive Sensitive',pssm:'PSSM',hoof:'Hoof Care',ir:'Insulin Resistant',overweight:'Overweight',healthy:'Healthy'};
const CONDITION_BADGE={senior:'badge-senior',teeth:'badge-teeth',digestive:'badge-digestive',pssm:'badge-pssm',hoof:'badge-hoof',ir:'badge-ir',overweight:'badge-overweight',healthy:'badge-healthy'};

const ALL_SUPPS=[
{id:'balanced_gold',name:'Triple Crown Balanced Gold',desc:'Ration balancer',dose:4,unit:'oz',forAll:true},
{id:'amino_trace',name:'Amino Trace+',desc:'Trace minerals + amino acids',dose:2,unit:'oz',forAll:true},
{id:'daily_red',name:'Daily Red Fortified',desc:'Vitamin/mineral',dose:2,unit:'oz',forAll:true},
{id:'digest_911',name:'Digest 911',desc:'Digestive support',dose:1,unit:'oz',forAll:true},
{id:'turmeric',name:'Turmeric for Horse',desc:'Anti-inflammatory',dose:1,unit:'tbsp',forAll:true},
{id:'super_sport',name:'Purina Super Sport',desc:'Amino acids for muscle support',dose:4,unit:'oz'},
{id:'gut_gold',name:'Assured Gut Gold',desc:'Gut health & microbiome',dose:1,unit:'oz'},
{id:'weight_accel',name:'Senior Weight Accelerator',desc:'Calorie-dense weight support',dose:8,unit:'oz'},
{id:'vit_e',name:'Health-E Max Vitamin E',desc:'Antioxidant & neuromuscular support',dose:1,unit:'scoop'}
];

// Condition → supplement recommendation rules
// Each rule: {suppId, conditions (any match triggers), reason}
const SUPP_RULES=[
{suppId:'digest_911',conditions:['digestive'],reason:'Digestive sensitive → gut support'},
{suppId:'gut_gold',conditions:['digestive'],reason:'Digestive sensitive → microbiome support'},
{suppId:'super_sport',conditions:['pssm'],reason:'PSSM → amino acids for muscle maintenance'},
{suppId:'vit_e',conditions:['pssm'],reason:'PSSM → critical antioxidant for neuromuscular health'},
{suppId:'weight_accel',conditions:['senior'],reason:'Senior → calorie-dense support for weight maintenance'},
{suppId:'turmeric',conditions:['hoof','senior','pssm'],reason:'Anti-inflammatory support'},
{suppId:'amino_trace',conditions:['hoof'],reason:'Hoof care → trace minerals including biotin & zinc'},
];
// Backward compat helpers
const BASE_SUPPS=ALL_SUPPS.filter(s=>s.forAll);
const TENOR_SUPPS=ALL_SUPPS.filter(s=>!s.forAll);

const DEFAULT_HORSES=[
{id:'tenor',name:'Tenor',weight:700,conditions:['senior','teeth','digestive','pssm','hoof'],activity:'moderate',emoji:'🐎'},
{id:'odinn',name:'Odinn',weight:700,conditions:['healthy','digestive'],activity:'moderate',emoji:'🏇'},
{id:'uffie',name:'Uffie',weight:800,conditions:['healthy','digestive'],activity:'moderate',emoji:'🐴'},
{id:'spoi',name:'Spoi',weight:950,conditions:['ir','overweight'],activity:'moderate',emoji:'🐎'}
];

const ACTIVITIES=[{id:'light',label:'Light'},{id:'moderate',label:'Moderate (~1hr/day)'},{id:'heavy',label:'Heavy'}];

// ── State ──
let state=loadState();
let selectedHorse=0;
let selectedTab='recs';
let trendHorse=0;

// Auto-detect season based on US DST
// Summer = 2nd Sunday of March to 1st Sunday of November
function getAutoSeason(){
const now=new Date();
const year=now.getFullYear();
// 2nd Sunday of March
const mar1=new Date(year,2,1);
const marSun2=new Date(year,2,8+(7-mar1.getDay())%7+7);
// Actually: 2nd Sunday = day 8..14 that is Sunday
const dstStart=new Date(year,2,14-(new Date(year,2,1).getDay()+6)%7);
// Simpler: find 2nd Sunday of March
const marchFirst=new Date(year,2,1).getDay();// 0=Sun
const secondSunMar=14-((marchFirst+6)%7);
const dstOn=new Date(year,2,secondSunMar);
// 1st Sunday of November
const novFirst=new Date(year,10,1).getDay();
const firstSunNov=1+((7-novFirst)%7);
const dstOff=new Date(year,10,firstSunNov);
return(now>=dstOn&&now<dstOff)?'summer':'winter';
}

function defaultState(){
return{
horses:JSON.parse(JSON.stringify(DEFAULT_HORSES)),
season:getAutoSeason(),
feeds:{},supplements:{},adjustments:{}
};
}
function loadState(){
try{const s=localStorage.getItem('hfc_state');if(s){
const parsed=JSON.parse(s);
// Auto-update season on each load
parsed.season=getAutoSeason();
return parsed;
}}catch(e){}
return defaultState();
}
function save(){localStorage.setItem('hfc_state',JSON.stringify(state))}

// ── Recommendation Engine ──
function getTargetRange(h){
const w=h.weight;
const hasIR=h.conditions.includes('ir');
const hasOW=h.conditions.includes('overweight');
if(hasIR||hasOW)return[w*0.012,w*0.015];
return[w*0.015,w*0.018];
}

function recommend(h){
const[lo,hi]=getTargetRange(h);
const mid=(lo+hi)/2;
const isSummer=state.season==='summer';
const c=h.conditions;
const hasPSSM=c.includes('pssm');const hasTeeth=c.includes('teeth');
const hasIR=c.includes('ir');const hasOW=c.includes('overweight');
const hasDig=c.includes('digestive');const isSenior=c.includes('senior');

let r={pasture:false,timothy_hay:0,alfalfa_hay:0,soaked_timothy:0,soaked_teff:0,soaked_alfalfa:0,special_pellets:0,soaked_beet:0};
let notes=[];

// Tenor-like: senior+teeth+pssm
if(isSenior&&hasTeeth&&hasPSSM){
r.pasture=isSummer;
const pastureEst=isSummer?2:0;
const dryHay=Math.min(5,mid*0.4);
r.timothy_hay=+(dryHay*0.75).toFixed(1);
r.alfalfa_hay=+(dryHay*0.25).toFixed(1);
const remaining=mid-pastureEst-dryHay;
r.soaked_timothy=+(remaining*0.55).toFixed(1);
r.soaked_alfalfa=+(remaining*0.2).toFixed(1);
r.soaked_beet=+(remaining*0.25).toFixed(1);
r.soaked_beet=Math.max(1,Math.min(2,r.soaked_beet));
r.special_pellets=0.5;
notes.push('⚠️ PSSM: Keep starch/sugar low, higher fat');
notes.push('🦷 Teeth: Prefer soaked feeds over dry');
notes.push('🍽️ Split into 3-4 smaller meals throughout the day');
if(c.includes('hoof'))notes.push('🐴 Monitor hoof condition — biotin supplementation recommended');
}
// IR/overweight (Spoi-like)
else if(hasIR||hasOW){
r.pasture=isSummer;
const pastureEst=isSummer?2:0;
const target=lo+(hi-lo)*0.3; // lean toward lower end
const hayAmt=target-pastureEst;
r.timothy_hay=+(hayAmt*0.6).toFixed(1);
r.soaked_teff=+(hayAmt*0.25).toFixed(1);
r.soaked_beet=+Math.min(1,(hayAmt*0.1)).toFixed(1);
r.alfalfa_hay=0;// avoid for IR
r.special_pellets=0;
notes.push('🚫 Avoid or minimize alfalfa (high sugar risk for IR)');
notes.push('💧 Soak hay 30-60 min to reduce sugar content');
if(hasOW)notes.push('⚖️ Target lower end of range for weight management');
}
// Healthy horses (Odinn/Uffie-like)
else{
r.pasture=isSummer;
const pastureEst=isSummer?3:0;
const remaining=mid-pastureEst;
if(remaining>0){
r.timothy_hay=+(remaining*0.65).toFixed(1);
r.alfalfa_hay=+(remaining*0.15).toFixed(1);
r.special_pellets=+Math.min(2,(remaining*0.12)).toFixed(1);
r.soaked_beet=+Math.min(1,(remaining*0.08)).toFixed(1);
}
}
if(hasDig&&!notes.some(n=>n.includes('meals')))notes.push('💚 Digestive sensitive: consider splitting meals');

// Clamp negatives
FEED_TYPES.forEach(f=>{if(!f.isPasture&&r[f.id]<0)r[f.id]=0});
return{feeds:r,notes,targetRange:[lo,hi]};
}

function getAdjusted(horseId,feedId){
const key=horseId+'_'+feedId;
if(state.adjustments[key]!==undefined)return state.adjustments[key];
return null;
}
function setAdjusted(horseId,feedId,val){
state.adjustments[horseId+'_'+feedId]=val;save();
}
function clearAdjustment(horseId,feedId){
delete state.adjustments[horseId+'_'+feedId];save();
}

function getFeedTotal(h,rec){
let total=0;
FEED_TYPES.forEach(f=>{
if(f.isPasture)return;
const adj=getAdjusted(h.id,f.id);
total+=(adj!==null?adj:rec.feeds[f.id])||0;
});
if(rec.feeds.pasture&&state.season==='summer')total+=(state.season==='summer'?3:0);// estimate
return total;
}

// ── Supplements ──
function getSuppsForHorse(h){
const c=h.conditions;
return ALL_SUPPS.map(s=>{
let recommended=!!s.forAll; // base supps always recommended
let reasons=[];
// Check condition-based rules
SUPP_RULES.forEach(rule=>{
if(rule.suppId===s.id && rule.conditions.some(cond=>c.includes(cond))){
recommended=true;
reasons.push(rule.reason);
}
});
// IR/overweight: reduce calorie-dense supps
if(s.id==='weight_accel'&&(c.includes('ir')||c.includes('overweight'))){
recommended=false;
reasons=['⚠️ Not recommended for IR/overweight — calorie-dense'];
}
return{...s,recommended,reasons};
});
}
function getSuppState(horseId,suppId){
const key='supp_'+horseId+'_'+suppId;
if(state.supplements[key]!==undefined)return state.supplements[key];
return null;// null=use default
}
function setSuppState(horseId,suppId,obj){
state.supplements['supp_'+horseId+'_'+suppId]=obj;save();
}

// ── Render: Tabs ──
document.getElementById('tabs').addEventListener('click',e=>{
const t=e.target.closest('.tab');if(!t)return;
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
t.classList.add('active');
selectedTab=t.dataset.tab;
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById('page-'+selectedTab).classList.add('active');
render();
});

function render(){
({recs:renderRecs,supps:renderSupps,summary:renderSummary,logs:renderLogs,trends:renderTrends,settings:renderSettings})[selectedTab]();
}

// ── Render: Horse Tabs (reusable) ──
function horseTabs(sel,onChange){
return '<div class="horse-tabs">'+state.horses.map((h,i)=>
`<div class="horse-tab${i===sel?' active':''}" data-idx="${i}">${h.emoji} ${h.name}</div>`
).join('')+'</div>';
}

// ── Render: Recommendations ──
function renderRecs(){
const el=document.getElementById('page-recs');
const h=state.horses[selectedHorse];
if(!h){el.innerHTML='<div class="empty-state"><div class="icon">🐴</div>No horses configured</div>';return;}
const rec=recommend(h);
const[lo,hi]=rec.targetRange;
const total=getFeedTotal(h,rec);
const pct=lo>0?((total/hi)*100):0;
const barClass=total<lo?'under':total>hi?'over':'good';

let html=horseTabs(selectedHorse);
html+=`<div class="card"><h3>${h.emoji} ${h.name} <span style="font-size:13px;color:var(--text-light)">${h.weight} lb</span></h3>`;
html+='<div class="conditions-list">';
h.conditions.forEach(c=>{
html+=`<span class="badge ${CONDITION_BADGE[c]||''}">${CONDITION_LABELS[c]||c}</span>`;
});
html+='</div>';
html+=`<div class="target-label">Daily Total: <strong>${total.toFixed(1)} lb</strong> / Target: ${lo.toFixed(1)}–${hi.toFixed(1)} lb</div>`;
html+=`<div class="target-bar"><div class="target-fill ${barClass}" style="width:${Math.min(120,pct).toFixed(0)}%"></div></div>`;
html+=`<div class="target-range"><span>${lo.toFixed(1)} lb</span><span>${hi.toFixed(1)} lb</span></div>`;
html+='</div>';

html+='<div class="card">';
FEED_TYPES.forEach(f=>{
if(f.isPasture){
html+=`<div class="pasture-toggle">
<span style="font-size:20px">🌿</span>
<span style="flex:1;font-size:13px;font-weight:600">Free Roaming Pasture</span>
<span class="badge ${rec.feeds.pasture?'badge-healthy':'badge-overweight'}">${rec.feeds.pasture?'Available ('+state.season+')':'Limited ('+state.season+')'}</span>
</div>`;
return;
}
const recVal=rec.feeds[f.id]||0;
const adj=getAdjusted(h.id,f.id);
const val=adj!==null?adj:recVal;
const isAdj=adj!==null&&Math.abs(adj-recVal)>0.05;
html+=`<div class="feed-row">
<div class="feed-name">${f.name}${isAdj?`<small>Rec: ${recVal.toFixed(1)} lb</small>`:''}</div>
<div class="feed-controls">
<button onclick="adjFeed('${h.id}','${f.id}',-0.5)">−</button>
<input type="number" step="0.1" min="0" max="50" value="${val.toFixed(1)}" onchange="setFeed('${h.id}','${f.id}',this.value)" id="feed_${h.id}_${f.id}">
<span class="unit">${f.unit}</span>
<button onclick="adjFeed('${h.id}','${f.id}',0.5)">+</button>
</div></div>`;
});
html+='</div>';

// Reset button
html+='<div style="text-align:right;margin-bottom:8px"><button class="btn btn-outline btn-sm" onclick="resetFeedAdj(\''+h.id+'\')" title="Reset to recommended values">🔄 Reset to Recommended</button></div>';

if(rec.notes.length){
html+='<div class="card"><h3>📝 Feeding Notes</h3>';
rec.notes.forEach(n=>{html+=`<div class="notes">${n}</div>`;});
html+='</div>';
}
el.innerHTML=html;
el.querySelectorAll('.horse-tab').forEach(t=>t.addEventListener('click',e=>{
selectedHorse=+e.target.closest('.horse-tab').dataset.idx;renderRecs();
}));
}
window.adjFeed=function(hid,fid,delta){
const h=state.horses.find(x=>x.id===hid);
const rec=recommend(h);
const adj=getAdjusted(hid,fid);
const cur=adj!==null?adj:(rec.feeds[fid]||0);
setAdjusted(hid,fid,Math.max(0,+(cur+delta).toFixed(1)));
renderRecs();
};
window.setFeed=function(hid,fid,val){
setAdjusted(hid,fid,Math.max(0,+parseFloat(val).toFixed(1)));
renderRecs();
};
window.resetFeedAdj=function(hid){
Object.keys(state.adjustments).forEach(k=>{if(k.startsWith(hid+'_'))delete state.adjustments[k]});
save();renderRecs();
};

// ── Render: Supplements ──
function renderSupps(){
const el=document.getElementById('page-supps');
const h=state.horses[selectedHorse];
if(!h){el.innerHTML='';return;}
const supps=getSuppsForHorse(h);
let html=horseTabs(selectedHorse);
html+='<div class="card">';
// Separate recommended vs other
const recSupps=supps.filter(s=>s.recommended);
const otherSupps=supps.filter(s=>!s.recommended);
if(recSupps.length){
html+='<div style="font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">✨ Recommended for '+h.name+'</div>';
}
function renderSuppRow(s){
const st=getSuppState(h.id,s.id);
const active=st!==null?st.active:s.recommended;
const dose=st!==null&&st.dose!==undefined?st.dose:s.dose;
const hasReasons=s.reasons&&s.reasons.length>0;
const highlight=s.recommended&&hasReasons;
html+=`<div class="supp-row" style="${highlight?'background:#f0faf0;border-radius:8px;padding:6px 8px;margin:2px 0':''}">
<label class="supp-toggle"><input type="checkbox" ${active?'checked':''} onchange="toggleSupp('${h.id}','${s.id}',this.checked,${dose})"><span class="slider"></span></label>
<div class="supp-info"><div class="name">${s.name}</div><div class="desc">${s.desc}</div>${hasReasons?'<div style="font-size:11px;color:var(--accent);margin-top:2px">'+s.reasons.join(' · ')+'</div>':''}</div>
<div class="supp-dose"><input type="number" step="0.5" min="0" value="${dose}" onchange="changeSuppDose('${h.id}','${s.id}',this.value,${active})" ${!active?'disabled':''}><span class="unit">${s.unit}</span></div>
</div>`;
}
recSupps.forEach(renderSuppRow);
if(otherSupps.length){
html+='<div style="font-size:12px;font-weight:700;color:var(--text-light);margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px">Other Supplements</div>';
otherSupps.forEach(renderSuppRow);
}
html+='</div>';
el.innerHTML=html;
el.querySelectorAll('.horse-tab').forEach(t=>t.addEventListener('click',e=>{
selectedHorse=+e.target.closest('.horse-tab').dataset.idx;renderSupps();
}));
}
window.toggleSupp=function(hid,sid,active,dose){setSuppState(hid,sid,{active,dose:+dose});renderSupps()};
window.changeSuppDose=function(hid,sid,dose,active){setSuppState(hid,sid,{active:!!active,dose:+dose});renderSupps()};

// ── Render: Summary ──
function renderSummary(){
const el=document.getElementById('page-summary');
let html='<div class="card"><h3>📊 Daily Feed Summary</h3>';
html+='<div style="overflow-x:auto"><table class="summary-table"><tr><th>Feed</th>';
state.horses.forEach(h=>{html+=`<th>${h.emoji} ${h.name}</th>`});
html+='<th>Total</th></tr>';
let grandTotals={};
FEED_TYPES.forEach(f=>{
if(f.isPasture){
html+='<tr><td>🌿 Pasture</td>';
state.horses.forEach(h=>{const rec=recommend(h);html+=`<td>${rec.feeds.pasture?'✅':'—'}</td>`});
html+='<td></td></tr>';return;
}
html+=`<tr><td>${f.name}</td>`;
let rowTotal=0;
state.horses.forEach(h=>{
const rec=recommend(h);
const adj=getAdjusted(h.id,f.id);
const val=adj!==null?adj:(rec.feeds[f.id]||0);
rowTotal+=val;
html+=`<td>${val.toFixed(1)}</td>`;
});
grandTotals[f.id]=rowTotal;
html+=`<td><strong>${rowTotal.toFixed(1)}</strong></td></tr>`;
});
const gt=Object.values(grandTotals).reduce((a,b)=>a+b,0);
html+=`<tr class="total-row"><td><strong>Total</strong></td>`;
state.horses.forEach(h=>{const rec=recommend(h);html+=`<td><strong>${getFeedTotal(h,rec).toFixed(1)}</strong></td>`});
html+=`<td><strong>${gt.toFixed(1)} lb</strong></td></tr></table></div></div>`;

// Supplements summary
html+='<div class="card"><h3>💊 Supplement Summary</h3><div style="overflow-x:auto"><table class="summary-table"><tr><th>Supplement</th>';
state.horses.forEach(h=>{html+=`<th>${h.emoji}</th>`});
html+='</tr>';
const allSuppIds=new Set();
state.horses.forEach(h=>getSuppsForHorse(h).forEach(s=>allSuppIds.add(s.id)));
const suppMap={};
ALL_SUPPS.forEach(s=>suppMap[s.id]=s);
allSuppIds.forEach(sid=>{
const s=suppMap[sid];if(!s)return;
html+=`<tr><td>${s.name}</td>`;
state.horses.forEach(h=>{
const hSupps=getSuppsForHorse(h);
const has=hSupps.find(x=>x.id===sid);
if(!has){html+='<td>—</td>';return;}
const st=getSuppState(h.id,sid);
const active=st!==null?st.active:has.recommended;
const dose=st!==null&&st.dose!==undefined?st.dose:has.dose;
html+=`<td>${active?dose+' '+has.unit:'—'}</td>`;
});
html+='</tr>';
});
html+='</table></div></div>';
el.innerHTML=html;
}

// ── Render: Logs ──
function renderLogs(){
const el=document.getElementById('page-logs');
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
let html='<div class="card"><div class="flex-between mb-8"><h3>📋 Daily Logs</h3><button class="btn btn-accent btn-sm" onclick="saveLog()">💾 Save Today</button></div>';
if(!logs.length){
html+='<div class="empty-state"><div class="icon">📋</div>No logs yet. Save today\'s snapshot!</div>';
}else{
logs.slice().reverse().forEach((l,i)=>{
const idx=logs.length-1-i;
html+=`<div class="log-entry"><div><div class="log-date">${l.date}</div><div style="font-size:12px;color:var(--text-light)">${l.horses.length} horses logged</div></div><div class="log-actions"><button class="btn btn-outline btn-sm" onclick="loadLog(${idx})">Load</button><button class="btn btn-sm" style="color:var(--danger)" onclick="deleteLog(${idx})">🗑️</button></div></div>`;
});
}
html+='</div>';
el.innerHTML=html;
}
window.saveLog=function(){
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
const today=new Date().toISOString().slice(0,10);
const snapshot={date:today,horses:state.horses.map(h=>{
const rec=recommend(h);
const feeds={};
FEED_TYPES.forEach(f=>{if(!f.isPasture){const adj=getAdjusted(h.id,f.id);feeds[f.id]=adj!==null?adj:(rec.feeds[f.id]||0)}});
feeds.pasture=rec.feeds.pasture;
const supps={};
getSuppsForHorse(h).forEach(s=>{
const st=getSuppState(h.id,s.id);
supps[s.id]={active:st?st.active:s.recommended,dose:st&&st.dose!==undefined?st.dose:s.dose,unit:s.unit};
});
return{id:h.id,name:h.name,weight:h.weight,feeds,supplements:supps};
}),season:state.season};
// Replace if same date exists
const existing=logs.findIndex(l=>l.date===today);
if(existing>=0)logs[existing]=snapshot;else logs.push(snapshot);
localStorage.setItem('hfc_logs',JSON.stringify(logs));
renderLogs();
alert('✅ Log saved for '+today);
};
window.loadLog=function(idx){
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
const l=logs[idx];if(!l)return;
l.horses.forEach(lh=>{
FEED_TYPES.forEach(f=>{if(!f.isPasture&&lh.feeds[f.id]!==undefined)setAdjusted(lh.id,f.id,lh.feeds[f.id])});
if(lh.supplements){Object.keys(lh.supplements).forEach(sid=>{setSuppState(lh.id,sid,lh.supplements[sid])})}
});
state.season=l.season||state.season;
save();alert('📋 Loaded log from '+l.date);render();
};
window.deleteLog=function(idx){
if(!confirm('Delete this log?'))return;
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
logs.splice(idx,1);
localStorage.setItem('hfc_logs',JSON.stringify(logs));
renderLogs();
};

// ── Render: Trends ──
function renderTrends(){
const el=document.getElementById('page-trends');
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
let html=horseTabs(trendHorse);
if(logs.length<2){
html+='<div class="empty-state"><div class="icon">📈</div>Need at least 2 log entries to show trends.</div>';
el.innerHTML=html;
el.querySelectorAll('.horse-tab').forEach(t=>t.addEventListener('click',e=>{trendHorse=+e.target.closest('.horse-tab').dataset.idx;renderTrends()}));
return;
}
const h=state.horses[trendHorse];
html+='<div class="card"><h3>📈 Feed Trends — '+h.name+'</h3><div class="chart-container"><canvas id="feedChart"></canvas></div></div>';
html+='<div class="card"><h3>⚖️ Weight Over Time — '+h.name+'</h3><div class="chart-container"><canvas id="weightChart"></canvas></div></div>';
el.innerHTML=html;
el.querySelectorAll('.horse-tab').forEach(t=>t.addEventListener('click',e=>{trendHorse=+e.target.closest('.horse-tab').dataset.idx;renderTrends()}));

drawChart('feedChart',logs,h.id,'feeds');
drawChart('weightChart',logs,h.id,'weight');
}

function drawChart(canvasId,logs,horseId,type){
const canvas=document.getElementById(canvasId);if(!canvas)return;
const ctx=canvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
const rect=canvas.parentElement.getBoundingClientRect();
canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
ctx.scale(dpr,dpr);
const W=rect.width,H=rect.height;
const pad={top:20,right:20,bottom:40,left:45};
const plotW=W-pad.left-pad.right,plotH=H-pad.top-pad.bottom;

const dates=logs.map(l=>l.date);
const colors=['#5c4033','#6b8e23','#2980b9','#e67e22','#c0392b','#8e44ad','#16a085'];

if(type==='weight'){
const vals=logs.map(l=>{const lh=l.horses.find(x=>x.id===horseId);return lh?lh.weight:null}).filter(v=>v!==null);
if(vals.length<2){ctx.fillStyle='#999';ctx.fillText('Not enough data',W/2-40,H/2);return}
const min=Math.min(...vals)*0.95,max=Math.max(...vals)*1.05;
ctx.strokeStyle='#e0d5cc';ctx.lineWidth=1;
for(let i=0;i<5;i++){
const y=pad.top+plotH*(1-i/4);
ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='right';
ctx.fillText((min+(max-min)*i/4).toFixed(0),pad.left-5,y+4);
}
ctx.strokeStyle=colors[0];ctx.lineWidth=2;ctx.beginPath();
vals.forEach((v,i)=>{
const x=pad.left+plotW*i/(vals.length-1);
const y=pad.top+plotH*(1-(v-min)/(max-min));
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
});ctx.stroke();
dates.forEach((d,i)=>{if(i%Math.ceil(dates.length/6)===0||i===dates.length-1){
ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';
ctx.fillText(d.slice(5),pad.left+plotW*i/(dates.length-1),H-pad.bottom+16);
}});
}else{
const feedIds=FEED_TYPES.filter(f=>!f.isPasture).map(f=>f.id);
const series=feedIds.map(fid=>logs.map(l=>{
const lh=l.horses.find(x=>x.id===horseId);
return lh&&lh.feeds&&lh.feeds[fid]!==undefined?lh.feeds[fid]:0;
}));
const maxVal=Math.max(5,...series.flat())*1.1;
ctx.strokeStyle='#e0d5cc';ctx.lineWidth=1;
for(let i=0;i<5;i++){
const y=pad.top+plotH*(1-i/4);
ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='right';
ctx.fillText((maxVal*i/4).toFixed(1),pad.left-5,y+4);
}
series.forEach((vals,si)=>{
if(vals.every(v=>v===0))return;
ctx.strokeStyle=colors[si%colors.length];ctx.lineWidth=2;ctx.beginPath();
vals.forEach((v,i)=>{
const x=pad.left+plotW*i/Math.max(1,vals.length-1);
const y=pad.top+plotH*(1-v/maxVal);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
});ctx.stroke();
});
// Legend
let lx=pad.left;
feedIds.forEach((fid,i)=>{
const s=series[i];if(s.every(v=>v===0))return;
ctx.fillStyle=colors[i%colors.length];
ctx.fillRect(lx,H-12,10,10);
ctx.fillStyle='#666';ctx.font='9px sans-serif';ctx.textAlign='left';
const label=FEED_TYPES.find(f=>f.id===fid).name.split(' ')[0];
ctx.fillText(label,lx+12,H-3);lx+=ctx.measureText(label).width+20;
});
dates.forEach((d,i)=>{if(i%Math.ceil(dates.length/6)===0||i===dates.length-1){
ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';
ctx.fillText(d.slice(5),pad.left+plotW*i/Math.max(1,dates.length-1),H-pad.bottom+16);
}});
}
}

// ── Render: Settings ──
function renderSettings(){
const el=document.getElementById('page-settings');
let html='<div class="card"><h3>🌿 Season</h3><div class="season-toggle">';
['summer','winter'].forEach(s=>{
html+=`<div class="season-btn${state.season===s?' active':''}" onclick="setSeason('${s}')">${s==='summer'?'☀️ Summer':'❄️ Winter'}</div>`;
});
html+='</div><div style="font-size:12px;color:var(--text-light)">Summer = more pasture available, Winter = more hay needed</div></div>';

state.horses.forEach((h,hi)=>{
html+=`<div class="card horse-settings-card"><h3>${h.emoji} ${h.name}</h3>`;
html+=`<div class="form-group"><label>Name</label><input value="${h.name}" onchange="updateHorse(${hi},'name',this.value)"></div>`;
html+=`<div class="form-group"><label>Weight (lb)</label><input type="number" value="${h.weight}" onchange="updateHorse(${hi},'weight',+this.value)"></div>`;
html+=`<div class="form-group"><label>Conditions</label><div style="display:flex;flex-wrap:wrap;gap:6px">`;
ALL_CONDITIONS.forEach(c=>{
const active=h.conditions.includes(c);
html+=`<div class="condition-chip${active?' active':''}" onclick="toggleCondition(${hi},'${c}')">${CONDITION_LABELS[c]}</div>`;
});
html+='</div></div>';
html+=`<div class="form-group"><label>Activity Level</label><div class="activity-selector">`;
ACTIVITIES.forEach(a=>{
html+=`<div class="activity-opt${h.activity===a.id?' active':''}" onclick="setActivity(${hi},'${a.id}')">${a.label}</div>`;
});
html+='</div></div></div>';
});

html+='<div class="card"><button class="btn btn-danger btn-block" onclick="resetDefaults()">🔄 Reset All to Defaults</button></div>';
el.innerHTML=html;
}
window.setSeason=function(s){state.season=s;save();renderSettings()};
window.updateHorse=function(i,k,v){state.horses[i][k]=v;save();renderSettings()};
window.toggleCondition=function(i,c){
const h=state.horses[i];
const idx=h.conditions.indexOf(c);
if(idx>=0){h.conditions.splice(idx,1)}
else{
h.conditions.push(c);
// Mutual exclusion: overweight/ir ↔ healthy
if(c==='overweight'||c==='ir'){h.conditions=h.conditions.filter(x=>x!=='healthy')}
if(c==='healthy'){h.conditions=h.conditions.filter(x=>x!=='overweight'&&x!=='ir')}
}
save();renderSettings();
};
window.setActivity=function(i,a){state.horses[i].activity=a;save();renderSettings()};
window.resetDefaults=function(){
if(!confirm('Reset everything to defaults? This will clear all adjustments.'))return;
state=defaultState();save();
localStorage.removeItem('hfc_logs');
selectedHorse=0;render();
};

// ── Init ──
render();

// ── Service Worker ──
if('serviceWorker' in navigator){
const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('Offline',{status:503}))))});`;
const blob=new Blob([swCode],{type:'application/javascript'});
navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
