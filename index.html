let householdId=localStorage.getItem('hfc_household')||null;
let fbRef=null;
let fbConnected=false;
let syncPaused=false; // prevent echo loops

function initFirebaseSync(){
if(!householdId)return;
fbRef=fbDb.ref('households/'+householdId);
// Listen for remote changes
fbRef.on('value',snap=>{
if(syncPaused)return;
const remote=snap.val();
if(!remote)return;
const remoteTs=remote._ts||0;
const localTs=state._ts||0;
if(remoteTs>localTs){
// Remote is newer — merge
if(remote.adjustments)state.adjustments=remote.adjustments;
if(remote.supplements)state.supplements=remote.supplements;
if(remote.horses)state.horses=remote.horses;
if(remote.season)state.season=remote.season;
state._ts=remoteTs;
localStorage.setItem('hfc_state',JSON.stringify(state));
render();
}
});
// Connection status
fbDb.ref('.info/connected').on('value',snap=>{
fbConnected=!!snap.val();
if(typeof renderSettings==='function'&&selectedTab==='settings')renderSettings();
});
}

function pushToFirebase(){
if(!fbRef||syncPaused)return;
state._ts=Date.now();
syncPaused=true;
fbRef.set({
horses:state.horses,
adjustments:state.adjustments||{},
supplements:state.supplements||{},
season:state.season,
_ts:state._ts
}).then(()=>{syncPaused=false}).catch(()=>{syncPaused=false});
}

function setHousehold(id){
if(fbRef)fbRef.off();
householdId=id;
localStorage.setItem('hfc_household',id);
initFirebaseSync();
pushToFirebase();
}

// Auto-detect season based on US DST
// Summer = 2nd Sunday of March to 1st Sunday of November
function getAutoSeason(){
const now=new Date();
const year=now.getFullYear();
// 2nd Sunday of March
const mar1=new Date(year,2,1);
const marSun2=new Date(year,2,8+(7-mar1.getDay())%7+7);
// Actually: 2nd Sunday = day 8..14 that is Sunday
const dstStart=new Date(year,2,14-(new Date(year,2,1).getDay()+6)%7);
// Simpler: find 2nd Sunday of March
const marchFirst=new Date(year,2,1).getDay();// 0=Sun
const secondSunMar=14-((marchFirst+6)%7);
const dstOn=new Date(year,2,secondSunMar);
// 1st Sunday of November
const novFirst=new Date(year,10,1).getDay();
const firstSunNov=1+((7-novFirst)%7);
const dstOff=new Date(year,10,firstSunNov);
return(now>=dstOn&&now<dstOff)?'summer':'winter';
}

// ── Recommendation Engine ──
function getTargetRange(h){
const w=h.weight;
const hasIR=h.conditions.includes('ir');
const hasOW=h.conditions.includes('overweight');
if(hasIR||hasOW)return[w*0.012,w*0.015];
return[w*0.015,w*0.018];
}

function recommend(h){
const[lo,hi]=getTargetRange(h);
const mid=(lo+hi)/2;
const isSummer=state.season==='summer';
const c=h.conditions;
const hasPSSM=c.includes('pssm');const hasTeeth=c.includes('teeth');
const hasIR=c.includes('ir');const hasOW=c.includes('overweight');
const hasDig=c.includes('digestive');const isSenior=c.includes('senior');

let r={pasture:false,timothy_hay:0,alfalfa_hay:0,soaked_timothy:0,soaked_teff:0,soaked_alfalfa:0,special_pellets:0,soaked_beet:0};
let notes=[];

// Tenor-like: senior+teeth+pssm
if(isSenior&&hasTeeth&&hasPSSM){
r.pasture=isSummer;
const pastureEst=isSummer?2:0;
// Vet guideline: teeth problems → >70% soaked feeds, minimal dry hay
const dryHay=Math.min(2,mid*0.15);
r.timothy_hay=+(dryHay*0.75).toFixed(1);
r.alfalfa_hay=+(dryHay*0.25).toFixed(1);
const remaining=mid-pastureEst-dryHay;
r.soaked_timothy=+(remaining*0.50).toFixed(1);
r.soaked_alfalfa=+(remaining*0.20).toFixed(1);
r.soaked_beet=+(remaining*0.20).toFixed(1);
r.soaked_beet=Math.max(1,Math.min(2.5,r.soaked_beet));
r.special_pellets=+(remaining*0.10).toFixed(1);
notes.push('⚠️ PSSM: Keep starch/sugar low (<12% NSC). Add fat for energy (oil/rice bran)');
notes.push('🦷 Teeth: ~80% soaked feeds — dry hay kept minimal per vet recommendation');
notes.push('🍽️ Split into 3-4 smaller meals throughout the day');
notes.push('🛢️ PSSM fat supplement: add ¼–½ cup vegetable or rice bran oil daily');
if(c.includes('hoof'))notes.push('🐴 Monitor hoof condition — biotin supplementation recommended');
}
// IR/overweight (Spoi-like)
else if(hasIR||hasOW){
// IR horses: restrict pasture severely (grazing muzzle or limited time)
r.pasture=false; // default off — must be manually enabled with caution
const pastureEst=0;
const target=lo+(hi-lo)*0.3; // lean toward lower end
const hayAmt=target-pastureEst;
r.timothy_hay=+(hayAmt*0.6).toFixed(1);
r.soaked_teff=+(hayAmt*0.25).toFixed(1);
r.soaked_beet=+Math.min(1,(hayAmt*0.1)).toFixed(1);
r.alfalfa_hay=0;// avoid for IR
r.special_pellets=0;
notes.push('🚫 Avoid or minimize alfalfa (high sugar risk for IR)');
notes.push('💧 Soak hay 30-60 min to reduce sugar content (can cut sugar up to 50%)');
notes.push('🚨 PASTURE WARNING: IR/overweight horses must have restricted grazing — use a grazing muzzle (reduces intake ~80%) or limit to early morning only. Avoid afternoon pasture when fructan levels peak.');
if(hasOW)notes.push('⚖️ Target lower end of range for weight management');
if(h.idealWeight)notes.push('🎯 Current: '+h.weight+' lb → Ideal: '+h.idealWeight+' lb (target '+Math.round((h.weight-h.idealWeight)/h.weight*100)+'% weight loss)');
notes.push('💊 Consider Magnesium supplementation to improve insulin sensitivity');
}
// Healthy horses (Odinn/Uffie-like)
else{
r.pasture=isSummer;
const pastureEst=isSummer?3:0;
const remaining=mid-pastureEst;
if(remaining>0){
r.timothy_hay=+(remaining*0.65).toFixed(1);
r.alfalfa_hay=+(remaining*0.15).toFixed(1);
r.special_pellets=+Math.min(2,(remaining*0.12)).toFixed(1);
r.soaked_beet=+Math.min(1,(remaining*0.08)).toFixed(1);
}
}
if(hasDig&&!notes.some(n=>n.includes('meals')))notes.push('💚 Digestive sensitive: consider splitting meals');

// Clamp negatives
FEED_TYPES.forEach(f=>{if(!f.isPasture&&r[f.id]<0)r[f.id]=0});
return{feeds:r,notes,targetRange:[lo,hi]};
}

function getAdjusted(horseId,feedId){
const key=horseId+'_'+feedId;
if(state.adjustments[key]!==undefined)return state.adjustments[key];
return null;
}
function setAdjusted(horseId,feedId,val){
state.adjustments[horseId+'_'+feedId]=val;save();
}
function clearAdjustment(horseId,feedId){
delete state.adjustments[horseId+'_'+feedId];save();
}

function getFeedTotal(h,rec){
let total=0;
FEED_TYPES.forEach(f=>{
if(f.isPasture)return;
const adj=getAdjusted(h.id,f.id);
total+=(adj!==null?adj:rec.feeds[f.id])||0;
});
// Include commercial feed if set
if(h.currentFeed && h.currentFeed.id){
const cfId='commercial_'+h.currentFeed.id;
const cfAdj=getAdjusted(h.id,cfId);
const cfDefault=+(h.currentFeed.feedRate.min*h.weight/h.currentFeed.feedRate.per).toFixed(1);
total+=(cfAdj!==null?cfAdj:cfDefault);
}
if(rec.feeds.pasture&&state.season==='summer')total+=(state.season==='summer'?3:0);// estimate
return total;
}

function getSuppsForHorse(h){
const c=h.conditions;
return ALL_SUPPS.map(s=>{
let recommended=!!s.forAll; // base supps always recommended
let reasons=[];
// Check condition-based rules
SUPP_RULES.forEach(rule=>{
if(rule.suppId===s.id && rule.conditions.some(cond=>c.includes(cond))){
recommended=true;
reasons.push(rule.reason);
}
});
// IR/overweight: reduce calorie-dense supps
if(s.id==='weight_accel'&&(c.includes('ir')||c.includes('overweight'))){
recommended=false;
reasons=['⚠️ Not recommended for IR/overweight — calorie-dense'];
}
// Mutual exclusion: BG ↔ AT+ (don't recommend both)
if(s.id==='balanced_gold'&&(c.includes('pssm')||c.includes('ir')||c.includes('hoof'))){
recommended=false;
reasons=['Use AminoTrace+ instead — designed for metabolic/hoof conditions'];
}
if(s.id==='amino_trace'&&!c.includes('pssm')&&!c.includes('ir')&&!c.includes('hoof')&&c.includes('healthy')){
recommended=false;
reasons=['Use Balancer Gold instead — sufficient for healthy horses'];
}
return{...s,recommended,reasons};
});
}

<button onclick="adjFeed('${h.id}','${f.id}',0.5)">+</button>
</div></div>`;
});
// Current commercial feed row (integrated)

const cfRecVal=cfMinFeed;

window.adjFeed=function(hid,fid,delta){
const h=state.horses.find(x=>x.id===hid);
const rec=recommend(h);
const adj=getAdjusted(hid,fid);
let defaultVal=rec.feeds[fid]||0;
// Handle commercial feed default
if(fid.startsWith('commercial_') && h.currentFeed && h.currentFeed.id){
defaultVal=+(h.currentFeed.feedRate.min*h.weight/h.currentFeed.feedRate.per).toFixed(1);
}
const cur=adj!==null?adj:defaultVal;
setAdjusted(hid,fid,Math.max(0,+(cur+delta).toFixed(1)));
renderRecs();
};
window.setFeed=function(hid,fid,val){
setAdjusted(hid,fid,Math.max(0,+parseFloat(val).toFixed(1)));
renderRecs();
};
window.resetFeedAdj=function(hid){
Object.keys(state.adjustments).forEach(k=>{if(k.startsWith(hid+'_'))delete state.adjustments[k]});
save();renderRecs();
};

el.innerHTML=html;
el.querySelectorAll('.horse-tab').forEach(t=>t.addEventListener('click',e=>{

function nscClass(nsc) { return nsc <= 10 ? 'nsc-low' : nsc <= 13 ? 'nsc-mid' : 'nsc-high'; }
function nscPct(nsc) { return Math.min(100, (nsc / 20) * 100); }

function showFeedDetail(feedId) {
  const feed = LOW_NSC_FEEDS.find(f => f.id === feedId);
  if (!feed) return;
  const existing = document.querySelector('.feed-detail-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'feed-detail-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) closeFeedDetail(); };
  const h = state.horses[selectedHorse];
  const weight = h ? h.weight : 1000;
  const minFeed = (feed.feedRate.min * weight / feed.feedRate.per).toFixed(1);
  const maxFeed = (feed.feedRate.max * weight / feed.feedRate.per).toFixed(1);
  const inCompare = compareList.includes(feedId);
  let html = '<div class="feed-detail-sheet">';
  html += '<div class="feed-detail-close"><button onclick="closeFeedDetail()">&times;</button></div>';
  html += '<div class="feed-card-brand">' + feed.brand + '</div>';
  html += '<div style="font-size:20px;font-weight:700;margin:4px 0 8px">' + feed.name + '</div>';
  html += '<div style="font-size:12px;color:var(--text-light);margin-bottom:12px">' + feed.type + '</div>';
  // Nutrient bars
  const nutrients = [
    { label: 'NSC', val: feed.nsc, max: 20, color: feed.nsc <= 10 ? 'var(--success)' : feed.nsc <= 13 ? 'var(--warning)' : 'var(--danger)' },
    { label: 'Protein', val: feed.protein, max: 35, color: 'var(--accent)' },
    { label: 'Fat', val: feed.fat, max: 10, color: 'var(--info)' },
    { label: 'Fiber', val: feed.fiber, max: 30, color: 'var(--primary-light)' }
  ];
  nutrients.forEach(n => {
    html += '<div class="nutrient-bar-row"><div class="nutrient-bar-label">' + n.label + '</div><div class="nutrient-bar-track"><div class="nutrient-bar-fill" style="width:' + (n.val / n.max * 100).toFixed(0) + '%;background:' + n.color + '"></div></div><div class="nutrient-bar-val">' + n.val + '%</div></div>';
  });
  // Sugar / Starch breakdown
  html += '<div style="font-size:12px;color:var(--text-light);margin:4px 0 12px">Sugar: ' + feed.sugar + '% · Starch: ' + feed.starch + '%</div>';
  // Features
  html += '<div style="margin:12px 0"><div style="font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;margin-bottom:6px">Features</div>';
  feed.features.forEach(f => { html += '<div style="font-size:13px;padding:3px 0">✅ ' + f + '</div>'; });
  html += '</div>';
  // Suitable for
  html += '<div style="margin:12px 0"><div style="font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;margin-bottom:6px">Suitable For</div><div style="display:flex;gap:4px;flex-wrap:wrap">';
  feed.suitableFor.forEach(s => { html += '<span class="badge badge-healthy">' + s + '</span>'; });
  html += '</div></div>';
  // Feed rate
  html += '<div class="card" style="margin:12px 0;background:var(--bg)"><div style="font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;margin-bottom:4px">Feed Rate for ' + (h ? h.name + ' (' + weight + ' lb)' : weight + ' lb horse') + '</div>';
  html += '<div style="font-size:18px;font-weight:700;color:var(--primary)">' + minFeed + ' \u2013 ' + maxFeed + ' lb/day</div>';
  html += '<div style="font-size:11px;color:var(--text-light)">Based on ' + feed.feedRate.min + '\u2013' + feed.feedRate.max + ' lb per ' + feed.feedRate.per + ' lb body weight</div></div>';
  // Warning
  if (feed.warning) {
    html += '<div style="background:#fff3e0;border:1.5px solid var(--warning);border-radius:8px;padding:10px 12px;margin:8px 0;font-size:13px;color:#7a4a00">\u26a0\ufe0f ' + feed.warning + '</div>';
  }
  // Tags
  html += '<div class="feed-tags" style="margin:12px 0">';
  if (feed.grainFree) html += '<span class="feed-tag">Grain Free</span>';
  if (feed.molassesFree) html += '<span class="feed-tag">Molasses Free</span>';
  if (feed.alfalfaFree) html += '<span class="feed-tag">Alfalfa Free</span>';
  if (feed.probiotics) html += '<span class="feed-tag">Probiotics</span>';
  html += '</div>';
  // Purchase links
  if (feed.purchaseLinks && feed.purchaseLinks.length) {
    html += '<div style="margin:12px 0"><div style="font-size:12px;font-weight:700;color:var(--text-light);text-transform:uppercase;margin-bottom:6px">Where to Buy</div><div style="display:flex;gap:8px;flex-wrap:wrap">';
    feed.purchaseLinks.forEach(l => {
      if (l.url) html += '<a href="' + l.url + '" target="_blank" rel="noopener" class="btn btn-accent btn-sm" style="text-decoration:none">' + l.store + '</a>';
      else html += '<span class="btn btn-outline btn-sm">' + l.store + '</span>';
    });
    html += '</div></div>';
  }
  // Set as current feed button
  const isCurrent = h && h.currentFeed && h.currentFeed.id === feed.id;
  if (isCurrent) {
    html += '<button class="btn btn-outline btn-block" style="margin-top:12px" disabled>✅ Current Feed for ' + h.name + '</button>';
  } else {
    html += '<button class="btn btn-accent btn-block" style="margin-top:12px" onclick="setCurrentFeed(\'' + feed.id + '\')">' + '🌾 Set as Current Feed' + (h ? ' for ' + h.name : '') + '</button>';
  }
  // Compare button
  html += '<button class="btn ' + (inCompare ? 'btn-danger' : 'btn-outline') + ' btn-block" style="margin-top:8px" onclick="toggleCompare(\'' + feed.id + '\');closeFeedDetail()">' + (inCompare ? 'Remove from Compare' : '\u2795 Add to Compare') + '</button>';
  html += '</div>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}
window.showFeedDetail = showFeedDetail;

function closeFeedDetail() {
  const overlay = document.querySelector('.feed-detail-overlay');
  if (overlay) overlay.remove();
}

function setCurrentFeed(feedId) {
  const feed = LOW_NSC_FEEDS.find(f => f.id === feedId);
  if (!feed) return;
  const h = state.horses[selectedHorse];
  if (!h) return;
  // Store selected feed on the horse
  if (!h.currentFeed) h.currentFeed = {};
  h.currentFeed = {
    id: feed.id,
    brand: feed.brand,
    name: feed.name,
    nsc: feed.nsc,
    sugar: feed.sugar,
    starch: feed.starch,
    protein: feed.protein,
    fat: feed.fat,
    fiber: feed.fiber,
    feedRate: feed.feedRate
  };
  save();
  closeFeedDetail();
  // Show confirmation
  const toast = document.createElement('div');
  toast.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;font-weight:600;z-index:300;animation:fadeIn .2s';
  toast.textContent = '\u2705 ' + feed.brand + ' ' + feed.name + ' set for ' + h.name;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}
window.setCurrentFeed = setCurrentFeed;

function toggleCompare(feedId) {
  const idx = compareList.indexOf(feedId);
  if (idx >= 0) compareList.splice(idx, 1);
  else if (compareList.length < 3) compareList.push(feedId);
  renderFeedsDb();
}
window.toggleCompare = toggleCompare;

function showCompare() {
  const feeds = compareList.map(id => LOW_NSC_FEEDS.find(f => f.id === id)).filter(Boolean);
  if (feeds.length < 2) { alert('Select at least 2 feeds to compare'); return; }
  const existing = document.querySelector('.feed-detail-overlay');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.className = 'feed-detail-overlay';
  overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
  const h = state.horses[selectedHorse];
  const weight = h ? h.weight : 1000;
  let html = '<div class="feed-detail-sheet">';
  html += '<div class="feed-detail-close"><button onclick="document.querySelector(\'.feed-detail-overlay\').remove()">&times;</button></div>';
  html += '<h3 style="margin-bottom:12px">\ud83d\udd0d Compare Feeds</h3>';
  html += '<div style="overflow-x:auto"><table class="summary-table"><tr><th></th>';
  feeds.forEach(f => { html += '<th style="font-size:12px">' + f.brand + '<br>' + f.name + '</th>'; });
  html += '</tr>';
  const rows = [
    { label: 'NSC %', key: 'nsc' }, { label: 'Sugar %', key: 'sugar' }, { label: 'Starch %', key: 'starch' },
    { label: 'Protein %', key: 'protein' }, { label: 'Fat %', key: 'fat' }, { label: 'Fiber %', key: 'fiber' }
  ];
  rows.forEach(r => {
    html += '<tr><td style="font-weight:600">' + r.label + '</td>';
    const vals = feeds.map(f => f[r.key]);
    const best = r.key === 'nsc' || r.key === 'sugar' || r.key === 'starch' ? Math.min(...vals) : Math.max(...vals);
    feeds.forEach(f => {
      const isBest = f[r.key] === best;
      html += '<td style="' + (isBest ? 'color:var(--success);font-weight:700' : '') + '">' + f[r.key] + '</td>';
    });
    html += '</tr>';
  });
  // Boolean rows
  ['grainFree', 'molassesFree', 'alfalfaFree', 'probiotics'].forEach(key => {
    const label = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
    html += '<tr><td style="font-weight:600">' + label + '</td>';
    feeds.forEach(f => { html += '<td>' + (f[key] ? '\u2705' : '\u274c') + '</td>'; });
    html += '</tr>';
  });
  // Feed rate
  html += '<tr><td style="font-weight:600">Feed Rate</td>';
  feeds.forEach(f => {
    const mn = (f.feedRate.min * weight / f.feedRate.per).toFixed(1);
    const mx = (f.feedRate.max * weight / f.feedRate.per).toFixed(1);
    html += '<td>' + mn + '\u2013' + mx + ' lb</td>';
  });
  html += '</tr></table></div></div>';
  overlay.innerHTML = html;
  document.body.appendChild(overlay);
}
window.showCompare = showCompare;

function setFeedDbSection(s) { feedDbSection = s; renderFeedsDb(); }
window.setFeedDbSection = setFeedDbSection;
function setFeedFilter(key, val) {
  if (key === 'maxNsc') feedDbFilter.maxNsc = val;
  else if (key === 'grainFree') feedDbFilter.grainFree = !feedDbFilter.grainFree;
  else if (key === 'molassesFree') feedDbFilter.molassesFree = !feedDbFilter.molassesFree;
  else if (key === 'type') feedDbFilter.type = val;
  renderFeedsDb();
}
window.setFeedFilter = setFeedFilter;

function renderFeedsDb() {
  const el = document.getElementById('page-feeds_db');
  let html = '';
  // Section toggle
  html += '<div class="feed-section-tabs">';
  html += '<div class="feed-section-tab' + (feedDbSection === 'commercial' ? ' active' : '') + '" onclick="setFeedDbSection(\'commercial\')">\ud83c\udf3e Commercial Feeds</div>';
  html += '<div class="feed-section-tab' + (feedDbSection === 'forages' ? ' active' : '') + '" onclick="setFeedDbSection(\'forages\')">\ud83c\udf3f Forages</div>';
  html += '</div>';

  if (feedDbSection === 'commercial') {
    // Filters
    html += '<div class="feed-filters">';
    [{ label: '\u226410%', val: 10 }, { label: '\u226412%', val: 12 }, { label: '\u226415%', val: 15 }, { label: 'All', val: 99 }].forEach(f => {
      html += '<div class="filter-chip' + (feedDbFilter.maxNsc === f.val ? ' active' : '') + '" onclick="setFeedFilter(\'maxNsc\',' + f.val + ')">' + f.label + ' NSC</div>';
    });
    html += '<div class="filter-chip' + (feedDbFilter.grainFree ? ' active' : '') + '" onclick="setFeedFilter(\'grainFree\')">' + (feedDbFilter.grainFree ? '\u2705 ' : '') + 'Grain Free</div>';
    html += '<div class="filter-chip' + (feedDbFilter.molassesFree ? ' active' : '') + '" onclick="setFeedFilter(\'molassesFree\')">' + (feedDbFilter.molassesFree ? '\u2705 ' : '') + 'Molasses Free</div>';
    html += '</div>';
    // Type filter
    html += '<div class="feed-filters">';
    ['all', 'Complete Feed', 'Ration Balancer'].forEach(t => {
      const label = t === 'all' ? 'All Types' : t;
      html += '<div class="filter-chip' + (feedDbFilter.type === t ? ' active' : '') + '" onclick="setFeedFilter(\'type\',\'' + t + '\')">' + label + '</div>';
    });
    html += '</div>';

    // Filter feeds
    let feeds = LOW_NSC_FEEDS.filter(f => {
      if (f.nsc > feedDbFilter.maxNsc) return false;
      if (feedDbFilter.grainFree && !f.grainFree) return false;
      if (feedDbFilter.molassesFree && !f.molassesFree) return false;
      if (feedDbFilter.type !== 'all' && f.type !== feedDbFilter.type) return false;
      return true;
    });
    feeds.sort((a, b) => a.nsc - b.nsc);

    if (!feeds.length) {
      html += '<div class="empty-state"><div class="icon">\ud83d\udd0d</div>No feeds match your filters</div>';
    } else {
      feeds.forEach(f => {
        const inCmp = compareList.includes(f.id);
        html += '<div class="feed-card" onclick="showFeedDetail(\'' + f.id + '\')">';
        html += '<div class="feed-card-header"><div>';
        html += '<div class="feed-card-brand">' + f.brand + '</div>';
        html += '<div class="feed-card-name">' + f.name + '</div>';
        html += '</div><div style="text-align:right">';
        html += '<div style="font-size:20px;font-weight:700;color:' + (f.nsc <= 10 ? 'var(--success)' : f.nsc <= 13 ? 'var(--warning)' : 'var(--danger)') + '">' + f.nsc + '%</div>';
        html += '<div style="font-size:10px;color:var(--text-light)">NSC</div>';
        html += '<div class="nsc-bar"><div class="nsc-fill ' + nscClass(f.nsc) + '" style="width:' + nscPct(f.nsc) + '%"></div></div>';
        html += '</div></div>';
        html += '<div class="feed-card-stats">';
        html += '<div class="feed-stat"><div class="feed-stat-val">' + f.protein + '</div><div class="feed-stat-label">Protein</div></div>';
        html += '<div class="feed-stat"><div class="feed-stat-val">' + f.fat + '</div><div class="feed-stat-label">Fat</div></div>';
        html += '<div class="feed-stat"><div class="feed-stat-val">' + f.fiber + '</div><div class="feed-stat-label">Fiber</div></div>';
        html += '<div class="feed-stat"><div class="feed-stat-val" style="font-size:12px">' + f.type.split(' ')[0] + '</div><div class="feed-stat-label">Type</div></div>';
        html += '</div>';
        html += '<div class="feed-tags">';
        if (f.grainFree) html += '<span class="feed-tag">Grain Free</span>';
        if (f.molassesFree) html += '<span class="feed-tag">Molasses Free</span>';
        if (f.alfalfaFree) html += '<span class="feed-tag">Alfalfa Free</span>';
        if (f.probiotics) html += '<span class="feed-tag">Probiotics</span>';
        html += '</div>';
        if (f.warning) html += '<div style="font-size:11px;color:var(--danger);margin-top:6px">\u26a0\ufe0f ' + f.warning + '</div>';
        // Compare checkbox
        html += '<div style="margin-top:8px;display:flex;align-items:center;gap:6px" onclick="event.stopPropagation();toggleCompare(\'' + f.id + '\')">';
        html += '<input type="checkbox" ' + (inCmp ? 'checked' : '') + ' style="accent-color:var(--accent)" onclick="event.stopPropagation();toggleCompare(\'' + f.id + '\')">';
        html += '<span style="font-size:12px;color:var(--text-light)">Compare</span></div>';
        html += '</div>';
      });
    }
  } else {
    // Forages section
    html += '<div class="card"><h3>\ud83c\udf3f Forage NSC Guide</h3>';
    html += '<div class="notes" style="margin-bottom:12px">\ud83d\udca7 <strong>Soaking Tip:</strong> Soak hay in cold water for 30\u201360 minutes to reduce sugar content by up to 30%. Drain and discard water. Do not reuse soaking water.</div>';
    LOW_NSC_FORAGES.forEach(f => {
      const rangeMin = f.nscRange[0], rangeMax = f.nscRange[1];
      const barLeft = (rangeMin / 25 * 100).toFixed(0);

      html += '<div style="font-size:12px;color:var(--text-light)">' + f.type + ' \u00b7 ' + f.grassType + ' \u00b7 Protein: ' + f.protein + '</div></div>';
      html += '<div style="text-align:right"><div style="font-size:14px;font-weight:700;color:var(--success)">' + f.typicalNsc + '%</div><div style="font-size:10px;color:var(--text-light)">Typical NSC</div></div></div>';

      html += '<div style="margin:8px 0"><div class="forage-range-bar" style="max-width:100%;width:100%"><div class="forage-range-fill" style="left:' + barLeft + '%;width:' + barWidth + '%"></div><div style="position:absolute;left:' + typicalLeft + '%;top:-3px;width:3px;height:14px;background:var(--primary);border-radius:2px" title="Typical: ' + f.typicalNsc + '%"></div></div>';

      html += '</div>';
    });
    html += '</div>';
  }

  // Compare bar
  if (compareList.length > 0) {
    html += '<div class="compare-bar"><span>' + compareList.length + '/3 selected</span>';
    html += '<div style="display:flex;gap:8px"><button class="compare-btn" onclick="compareList=[];renderFeedsDb()">Clear</button>';
    if (compareList.length >= 2) html += '<button class="compare-btn" onclick="showCompare()">Compare \u2192</button>';
    html += '</div></div>';
  }

  el.innerHTML = html;
}

// ── Render: Summary ──
function renderSummary(){
const el=document.getElementById('page-summary');
let html='<div class="card"><h3>📊 Daily Feed Summary</h3>';
html+='<div style="overflow-x:auto"><table class="summary-table"><tr><th>Feed</th>';
state.horses.forEach(h=>{html+=`<th>${h.emoji} ${h.name}</th>`});
html+='<th>Total</th></tr>';
let grandTotals={};
FEED_TYPES.forEach(f=>{
if(f.isPasture){
html+='<tr><td>🌿 Pasture</td>';
state.horses.forEach(h=>{const rec=recommend(h);html+=`<td>${rec.feeds.pasture?'✅':'—'}</td>`});
html+='<td></td></tr>';return;
}
html+=`<tr><td>${f.name}</td>`;
let rowTotal=0;
state.horses.forEach(h=>{
const rec=recommend(h);
const adj=getAdjusted(h.id,f.id);
const val=adj!==null?adj:(rec.feeds[f.id]||0);
rowTotal+=val;
html+=`<td>${val.toFixed(1)}</td>`;
});
grandTotals[f.id]=rowTotal;
html+=`<td><strong>${rowTotal.toFixed(1)}</strong></td></tr>`;
});
const gt=Object.values(grandTotals).reduce((a,b)=>a+b,0);
html+=`<tr class="total-row"><td><strong>Total</strong></td>`;
state.horses.forEach(h=>{const rec=recommend(h);html+=`<td><strong>${getFeedTotal(h,rec).toFixed(1)}</strong></td>`});
html+=`<td><strong>${gt.toFixed(1)} lb</strong></td></tr></table></div></div>`;

// Supplements summary
html+='<div class="card"><h3>💊 Supplement Summary</h3><div style="overflow-x:auto"><table class="summary-table"><tr><th>Supplement</th>';
state.horses.forEach(h=>{html+=`<th>${h.emoji}</th>`});
html+='</tr>';
const allSuppIds=new Set();
state.horses.forEach(h=>getSuppsForHorse(h).forEach(s=>allSuppIds.add(s.id)));
const suppMap={};
ALL_SUPPS.forEach(s=>suppMap[s.id]=s);
allSuppIds.forEach(sid=>{
const s=suppMap[sid];if(!s)return;
html+=`<tr><td>${s.name}</td>`;
state.horses.forEach(h=>{
const hSupps=getSuppsForHorse(h);
const has=hSupps.find(x=>x.id===sid);
if(!has){html+='<td>—</td>';return;}
const st=getSuppState(h.id,sid);
const active=st!==null?st.active:has.recommended;
const dose=st!==null&&st.dose!==undefined?st.dose:has.dose;
html+=`<td>${active?dose+' '+has.unit:'—'}</td>`;
});
html+='</tr>';
});
html+='</table></div></div>';
el.innerHTML=html;
}

// ── Render: Logs ──
function renderLogs(){
const el=document.getElementById('page-logs');
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
let html='<div class="card"><div class="flex-between mb-8"><h3>📋 Daily Logs</h3><button class="btn btn-accent btn-sm" onclick="saveLog()">💾 Save Today</button></div>';
if(!logs.length){
html+='<div class="empty-state"><div class="icon">📋</div>No logs yet. Save today\'s snapshot!</div>';
}else{
logs.slice().reverse().forEach((l,i)=>{
const idx=logs.length-1-i;
html+=`<div class="log-entry"><div><div class="log-date">${l.date}</div><div style="font-size:12px;color:var(--text-light)">${l.horses.length} horses logged</div></div><div class="log-actions"><button class="btn btn-outline btn-sm" onclick="loadLog(${idx})">Load</button><button class="btn btn-sm" style="color:var(--danger)" onclick="deleteLog(${idx})">🗑️</button></div></div>`;
});
}
html+='</div>';
el.innerHTML=html;
}
window.saveLog=function(){
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
const today=new Date().toISOString().slice(0,10);
const snapshot={date:today,horses:state.horses.map(h=>{
const rec=recommend(h);
const feeds={};
FEED_TYPES.forEach(f=>{if(!f.isPasture){const adj=getAdjusted(h.id,f.id);feeds[f.id]=adj!==null?adj:(rec.feeds[f.id]||0)}});
feeds.pasture=rec.feeds.pasture;
const supps={};
getSuppsForHorse(h).forEach(s=>{
const st=getSuppState(h.id,s.id);
supps[s.id]={active:st?st.active:s.recommended,dose:st&&st.dose!==undefined?st.dose:s.dose,unit:s.unit};
});
return{id:h.id,name:h.name,weight:h.weight,feeds,supplements:supps};
}),season:state.season};
// Replace if same date exists
const existing=logs.findIndex(l=>l.date===today);
if(existing>=0)logs[existing]=snapshot;else logs.push(snapshot);
localStorage.setItem('hfc_logs',JSON.stringify(logs));
renderLogs();
alert('✅ Log saved for '+today);
};
window.loadLog=function(idx){
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
const l=logs[idx];if(!l)return;
l.horses.forEach(lh=>{
FEED_TYPES.forEach(f=>{if(!f.isPasture&&lh.feeds[f.id]!==undefined)setAdjusted(lh.id,f.id,lh.feeds[f.id])});
if(lh.supplements){Object.keys(lh.supplements).forEach(sid=>{setSuppState(lh.id,sid,lh.supplements[sid])})}
});
state.season=l.season||state.season;
save();alert('📋 Loaded log from '+l.date);render();
};
window.deleteLog=function(idx){
if(!confirm('Delete this log?'))return;
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
logs.splice(idx,1);
localStorage.setItem('hfc_logs',JSON.stringify(logs));
renderLogs();
};

// ── Render: Trends ──
function renderTrends(){
const el=document.getElementById('page-trends');
const logs=JSON.parse(localStorage.getItem('hfc_logs')||'[]');
let html=horseTabs(trendHorse);

}
const h=state.horses[trendHorse];
html+='<div class="card"><h3>📈 Feed Trends — '+h.name+'</h3><div class="chart-container"><canvas id="feedChart"></canvas></div></div>';
html+='<div class="card"><h3>⚖️ Weight Over Time — '+h.name+'</h3><div class="chart-container"><canvas id="weightChart"></canvas></div></div>';
el.innerHTML=html;

}

function drawChart(canvasId,logs,horseId,type){
const canvas=document.getElementById(canvasId);if(!canvas)return;
const ctx=canvas.getContext('2d');
const dpr=window.devicePixelRatio||1;
const rect=canvas.parentElement.getBoundingClientRect();
canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
ctx.scale(dpr,dpr);
const W=rect.width,H=rect.height;
const pad={top:20,right:20,bottom:40,left:45};
const plotW=W-pad.left-pad.right,plotH=H-pad.top-pad.bottom;

const dates=logs.map(l=>l.date);
/* Wong colorblind-safe palette for chart lines */
const colors=['#000000','#e69f00','#56b4e9','#009e73','#d55e00','#cc79a7','#0072b2'];

if(type==='weight'){
const vals=logs.map(l=>{const lh=l.horses.find(x=>x.id===horseId);return lh?lh.weight:null}).filter(v=>v!==null);
if(vals.length<2){ctx.fillStyle='#999';ctx.fillText('Not enough data',W/2-40,H/2);return}
const min=Math.min(...vals)*0.95,max=Math.max(...vals)*1.05;
ctx.strokeStyle='#e0d5cc';ctx.lineWidth=1;
for(let i=0;i<5;i++){
const y=pad.top+plotH*(1-i/4);
ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='right';
ctx.fillText((min+(max-min)*i/4).toFixed(0),pad.left-5,y+4);
}
ctx.strokeStyle=colors[0];ctx.lineWidth=2;ctx.beginPath();
vals.forEach((v,i)=>{
const x=pad.left+plotW*i/(vals.length-1);
const y=pad.top+plotH*(1-(v-min)/(max-min));
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
});ctx.stroke();
dates.forEach((d,i)=>{if(i%Math.ceil(dates.length/6)===0||i===dates.length-1){
ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';
ctx.fillText(d.slice(5),pad.left+plotW*i/(dates.length-1),H-pad.bottom+16);
}});
}else{
const feedIds=FEED_TYPES.filter(f=>!f.isPasture).map(f=>f.id);
const series=feedIds.map(fid=>logs.map(l=>{
const lh=l.horses.find(x=>x.id===horseId);
return lh&&lh.feeds&&lh.feeds[fid]!==undefined?lh.feeds[fid]:0;
}));
const maxVal=Math.max(5,...series.flat())*1.1;
ctx.strokeStyle='#e0d5cc';ctx.lineWidth=1;
for(let i=0;i<5;i++){
const y=pad.top+plotH*(1-i/4);
ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(W-pad.right,y);ctx.stroke();
ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='right';
ctx.fillText((maxVal*i/4).toFixed(1),pad.left-5,y+4);
}
series.forEach((vals,si)=>{
if(vals.every(v=>v===0))return;
ctx.strokeStyle=colors[si%colors.length];ctx.lineWidth=2;ctx.beginPath();
vals.forEach((v,i)=>{
const x=pad.left+plotW*i/Math.max(1,vals.length-1);
const y=pad.top+plotH*(1-v/maxVal);
i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
});ctx.stroke();
});
// Legend
let lx=pad.left;
feedIds.forEach((fid,i)=>{
const s=series[i];if(s.every(v=>v===0))return;
ctx.fillStyle=colors[i%colors.length];
ctx.fillRect(lx,H-12,10,10);
ctx.fillStyle='#666';ctx.font='9px sans-serif';ctx.textAlign='left';
const label=FEED_TYPES.find(f=>f.id===fid).name.split(' ')[0];
ctx.fillText(label,lx+12,H-3);lx+=ctx.measureText(label).width+20;
});
dates.forEach((d,i)=>{if(i%Math.ceil(dates.length/6)===0||i===dates.length-1){
ctx.fillStyle='#999';ctx.font='10px sans-serif';ctx.textAlign='center';
ctx.fillText(d.slice(5),pad.left+plotW*i/Math.max(1,dates.length-1),H-pad.bottom+16);
}});
}
}

// ── Render: Settings ──
function renderSettings(){
const el=document.getElementById('page-settings');
let html='<div class="card"><h3>🌿 Season</h3><div class="season-toggle">';
['summer','winter'].forEach(s=>{
html+=`<div class="season-btn${state.season===s?' active':''}" onclick="setSeason('${s}')">${s==='summer'?'☀️ Summer':'❄️ Winter'}</div>`;
});
html+='</div><div style="font-size:12px;color:var(--text-light)">Summer = more pasture available, Winter = more hay needed</div></div>';

state.horses.forEach((h,hi)=>{
html+=`<div class="card horse-settings-card"><h3>${h.emoji} ${h.name}</h3>`;
html+=`<div class="form-group"><label>Name</label><input value="${h.name}" onchange="updateHorse(${hi},'name',this.value)"></div>`;
html+=`<div class="form-group"><label>Weight (lb)</label><input type="number" value="${h.weight}" onchange="updateHorse(${hi},'weight',+this.value)"></div>`;
html+=`<div class="form-group"><label>Ideal Weight (lb) — leave 0 for none</label><input type="number" value="${h.idealWeight||0}" onchange="updateHorse(${hi},'idealWeight',+this.value||undefined)"></div>`;
html+=`<div class="form-group"><label>Conditions</label><div style="display:flex;flex-wrap:wrap;gap:6px">`;
ALL_CONDITIONS.forEach(c=>{
const active=h.conditions.includes(c);
html+=`<div class="condition-chip${active?' active':''}" onclick="toggleCondition(${hi},'${c}')">${CONDITION_LABELS[c]}</div>`;
});
html+='</div></div>';
html+=`<div class="form-group"><label>Activity Level</label><div class="activity-selector">`;
ACTIVITIES.forEach(a=>{
html+=`<div class="activity-opt${h.activity===a.id?' active':''}" onclick="setActivity(${hi},'${a.id}')">${a.label}</div>`;
});
html+='</div></div></div>';
});

// ── Cloud Sync section ──
html+='<div class="card"><h3>☁️ Cloud Sync</h3>';
if(householdId){
html+=`<div class="sync-status ${fbConnected?'online':'offline'}"><div class="dot"></div>${fbConnected?'Connected':'Offline — changes saved locally'}</div>`;
html+=`<div class="form-group"><label>Household ID</label><div style="display:flex;gap:8px"><input value="${householdId}" id="hh_id_display" readonly style="background:var(--bg);flex:1"><button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText('${householdId}');this.textContent='Copied!';setTimeout(()=>this.textContent='Copy',1500)">Copy</button></div></div>`;
html+='<div style="font-size:12px;color:var(--text-light);margin-bottom:12px">Share this ID with other devices to sync. Open Settings on the other device and enter the same ID.</div>';
html+='<button class="btn btn-outline btn-sm" onclick="if(confirm(\'Disconnect from cloud sync?\')){{localStorage.removeItem(\'hfc_household\');householdId=null;if(fbRef)fbRef.off();fbRef=null;renderSettings()}}">Disconnect</button>';
}else{
html+='<div style="font-size:13px;margin-bottom:12px">Sync your feed adjustments and supplement settings across all your devices.</div>';
html+='<div class="form-group"><label>Join existing household</label><div style="display:flex;gap:8px"><input id="hh_join_input" placeholder="e.g. tenor-saga-4821" style="flex:1"><button class="btn btn-accent btn-sm" onclick="const v=document.getElementById(\'hh_join_input\').value.trim();if(v){setHousehold(v);renderSettings()}">Join</button></div></div>';
html+='<div style="text-align:center;font-size:12px;color:var(--text-light);margin:8px 0">— or —</div>';
html+=`<button class="btn btn-primary btn-block" onclick="setHousehold(generateHouseholdId());renderSettings()">🆕 Create New Household</button>`;
}
html+='</div>';
html+='<div class="card"><button class="btn btn-danger btn-block" onclick="resetDefaults()">🔄 Reset All to Defaults</button></div>';
el.innerHTML=html;
}
window.setSeason=function(s){state.season=s;save();renderSettings()};
window.updateHorse=function(i,k,v){state.horses[i][k]=v;save();renderSettings()};
window.toggleCondition=function(i,c){
const h=state.horses[i];
const idx=h.conditions.indexOf(c);
if(idx>=0){h.conditions.splice(idx,1)}
else{
h.conditions.push(c);
// Mutual exclusion: overweight/ir ↔ healthy
if(c==='overweight'||c==='ir'){h.conditions=h.conditions.filter(x=>x!=='healthy')}
if(c==='healthy'){h.conditions=h.conditions.filter(x=>x!=='overweight'&&x!=='ir')}
}
save();renderSettings();
};
window.setActivity=function(i,a){state.horses[i].activity=a;save();renderSettings()};
window.resetDefaults=function(){
if(!confirm('Reset everything to defaults? This will clear all adjustments.'))return;
state=defaultState();save();
localStorage.removeItem('hfc_logs');
selectedHorse=0;render();
};

// ── Init ──
render();
initFirebaseSync();

// ── Service Worker ──
if('serviceWorker' in navigator){
const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>self.clients.claim());self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('Offline',{status:503}))))});`;
const blob=new Blob([swCode],{type:'application/javascript'});
navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
